# Deploy Kinshout API to production when Master branch is updated.
name: Build and deploy ASP.Net Core app to Azure Web App - kinshout-api-prod

on:
  push:
    branches:
      - Master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: dotnet publish
        run: dotnet publish -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1337B3058976429FB9074939041B8172 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3FCE721D276A4239A5CCC54A1EE0B495 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_34B03CFC9ED44EAD9905F975EB67AF1C }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'kinshout-api-prod'
          resource-group-name: 'Phpnet20211126011001ResourceGroup'
          slot-name: 'Production'
          package: .
